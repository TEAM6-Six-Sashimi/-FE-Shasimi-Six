name: Deploy to AWS EC2 with Docker

on:
  push:
    branches: ["main"]

jobs:
  # Job 1: 빌드 및 DockerHub 푸시
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            API_URL=${{ secrets.API_URL }}
            TOSS_CLIENT_KEY=${{ secrets.TOSS_CLIENT_KEY }}
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ vars.APP_NAME }}:latest

  # Job 2: EC2 배포
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker stop ${{ vars.APP_NAME }} || true
            docker rm ${{ vars.APP_NAME }} || true
            docker pull ${{ secrets.DOCKER_USERNAME }}/${{ vars.APP_NAME }}:latest
            # 워크플로우에서 3030으로 맞추기
            docker run -d \
              --name ${{ vars.APP_NAME }} \
              -p 3001:3030 \
              --restart unless-stopped \
              ${{ secrets.DOCKER_USERNAME }}/${{ vars.APP_NAME }}:latest
            docker image prune -f
            
